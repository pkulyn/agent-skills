<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Index</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: system-ui, sans-serif; }

  #navbar {
    height: 48px; display: flex; align-items: center; gap: 4px;
    padding: 0 12px; background: #1a1a1a; border-bottom: 1px solid #333;
    overflow-x: auto; white-space: nowrap; flex-shrink: 0;
  }
  #navbar::-webkit-scrollbar { height: 4px; }
  #navbar::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

  .nav-btn {
    padding: 6px 14px; border: none; border-radius: 4px;
    background: transparent; color: #aaa; cursor: pointer;
    font-size: 13px; transition: all 0.15s;
  }
  .nav-btn:hover { background: #333; color: #fff; }
  .nav-btn.active { background: #4a90d9; color: #fff; }

  #stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  #slide-frame {
    border: none; background: #000;
  }

  #page-info {
    position: fixed; bottom: 12px; right: 20px;
    font-size: 13px; color: rgba(255,255,255,0.5);
    pointer-events: none; user-select: none;
  }
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;">

<div id="navbar"></div>
<div id="stage">
  <iframe id="slide-frame"></iframe>
</div>
<div id="page-info"></div>

<script>
(function() {
  // ── 配置：slide 文件列表 ──
  // 自动检测同目录 slide_*.html（需服务端目录列表或手动配置）
  // 这里用手动列表，生成时可替换
  const SLIDE_FILES = [
    /* SLIDE_FILES_PLACEHOLDER */
  ];

  const frame = document.getElementById('slide-frame');
  const navbar = document.getElementById('navbar');
  const pageInfo = document.getElementById('page-info');
  const total = SLIDE_FILES.length;

  if (total === 0) {
    navbar.innerHTML = '<span style="color:#f66;">No slide files found. Add slide_01.html, slide_02.html…</span>';
    return;
  }

  let current = 0;

  // ── 导航按钮 ──
  SLIDE_FILES.forEach(function(file, i) {
    var btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = (i + 1).toString().padStart(2, '0');
    btn.title = file;
    btn.addEventListener('click', function() { goTo(i); });
    navbar.appendChild(btn);
  });

  function goTo(index) {
    current = Math.max(0, Math.min(total - 1, index));
    frame.src = SLIDE_FILES[current];
    // 更新导航高亮
    var btns = navbar.querySelectorAll('.nav-btn');
    btns.forEach(function(b, i) {
      b.classList.toggle('active', i === current);
    });
    pageInfo.textContent = (current + 1) + ' / ' + total;
    // 滚动导航到可见
    btns[current].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    scaleFrame();
  }

  // ── 自动缩放 iframe ──
  function scaleFrame() {
    var stage = document.getElementById('stage');
    var vw = stage.clientWidth;
    var vh = stage.clientHeight;
    // 假设 16:9
    var aspect = 16 / 9;
    var w, h;
    if (vw / vh > aspect) {
      h = vh; w = h * aspect;
    } else {
      w = vw; h = w / aspect;
    }
    frame.style.width = w + 'px';
    frame.style.height = h + 'px';
  }

  // ── 键盘导航 ──
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': case 'ArrowDown': case ' ':
        e.preventDefault(); goTo(current + 1); break;
      case 'ArrowLeft': case 'ArrowUp':
        e.preventDefault(); goTo(current - 1); break;
      case 'Home': e.preventDefault(); goTo(0); break;
      case 'End': e.preventDefault(); goTo(total - 1); break;
    }
  });

  // ── 触摸滑动 ──
  var touchX = 0;
  document.addEventListener('touchstart', function(e) { touchX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) goTo(current + (dx < 0 ? 1 : -1));
  });

  window.addEventListener('resize', scaleFrame);

  // ── 初始化 ──
  goTo(0);
})();
</script>
</body>
</html>
