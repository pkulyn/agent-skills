<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<title>Style 04 - Dieter Rams功能主义</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#E8E4DF}
body{display:flex;align-items:center;justify-content:center;font-family:'Helvetica Neue','Noto Sans SC',sans-serif;color:#1A1A1A}
#dw{width:1920px;height:1080px;position:relative;transform-origin:center center}
.s{width:1920px;height:1080px;position:absolute;top:0;left:0;background:#FFFFFF;display:none;overflow:hidden;padding:80px 100px}
.s.on{display:flex}
#pi{position:fixed;bottom:24px;right:40px;font-size:16px;color:#888888;z-index:100;opacity:.7}
</style></head><body>
<div id="dw">

<!-- P1: 封面 -->
<section class="s on" style="flex-direction:column;justify-content:center">
  <div style="font-size:14px;font-family:'Helvetica Neue','Noto Sans SC',sans-serif;color:#FF6B00;letter-spacing:1.5px;margin-bottom:24px">STYLE 04</div>
  <div style="font-size:52px;font-weight:700;color:#1A1A1A;line-height:1.15;margin-bottom:24px">过去十年黄金价格</div>
  <div style="width:80px;height:3px;background:#FF6B00;margin-bottom:24px;border-radius:2px"></div>
  <div style="font-size:20px;color:#888888;line-height:1.7">2015–2025 年均价格（美元/盎司）</div>
</section>

<section class="s" style="flex-direction:column">

  </div>

<rect x="70" y="590" width="118" height="50" fill="#FF6B00" rx="2"/>

<rect x="201" y="562" width="118" height="78" fill="#FF6B00" rx="2"/>
<text x="260" y="658" text-anchor="middle" fill="#888888" font-size="12">2016</text>
<rect x="332" y="560" width="118" height="80" fill="#FF6B00" rx="2"/>
<text x="391" y="658" text-anchor="middle" fill="#888888" font-size="12">2017</text>
<rect x="464" y="557" width="118" height="83" fill="#FF6B00" rx="2"/>
<text x="523" y="658" text-anchor="middle" fill="#888888" font-size="12">2018</text>
<rect x="595" y="518" width="118" height="122" fill="#FF6B00" rx="2"/>
<text x="654" y="658" text-anchor="middle" fill="#888888" font-size="12">2019</text>
<rect x="726" y="401" width="118" height="239" fill="#FF6B00" rx="2"/>
<text x="785" y="658" text-anchor="middle" fill="#888888" font-size="12">2020</text>
<rect x="857" y="392" width="118" height="248" fill="#FF6B00" rx="2"/>
<text x="916" y="658" text-anchor="middle" fill="#888888" font-size="12">2021</text>
<rect x="988" y="392" width="118" height="248" fill="#FF6B00" rx="2"/>
<text x="1047" y="658" text-anchor="middle" fill="#888888" font-size="12">2022</text>
<rect x="1119" y="349" width="118" height="291" fill="#FF6B00" rx="2"/>
<text x="1179" y="658" text-anchor="middle" fill="#888888" font-size="12">2023</text>
<rect x="1251" y="210" width="118" height="430" fill="#FF6B00" rx="2"/>
<text x="1310" y="658" text-anchor="middle" fill="#888888" font-size="12">2024</text>
<rect x="1382" y="66" width="118" height="574" fill="#CC5500" rx="2"/>
<text x="1441" y="60" text-anchor="middle" fill="#1A1A1A" font-size="12" font-weight="600">$2850</text>
<text x="1441" y="658" text-anchor="middle" fill="#888888" font-size="12">2025</text>
</svg></div>
  <div style="display:flex;gap:24px;font-size:13px;color:#888888">
    <span>数据来源：World Gold Council / LBMA</span><span>2025年为Q1均值估算</span>
  </div>
</section>

<!-- P3: 折线图 + sparkline -->
<section class="s" style="flex-direction:column">
  <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:8px">
    <div style="font-size:36px;font-weight:700;color:#1A1A1A">黄金趋势</div>
    <div style="font-size:16px;color:#888888">2015–2025 折线图</div>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 1520 680" style="width:100%;height:100%">
<polyline points="70,590 213,562 356,560 499,557 642,518 785,401 928,392 1071,392 1214,349 1357,210 1500,66" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linejoin="round"/>
<text x="70" y="658" text-anchor="middle" fill="#888888" font-size="12">2015</text>
<text x="213" y="658" text-anchor="middle" fill="#888888" font-size="12">2016</text>
<text x="356" y="658" text-anchor="middle" fill="#888888" font-size="12">2017</text>
<text x="499" y="658" text-anchor="middle" fill="#888888" font-size="12">2018</text>
<text x="642" y="658" text-anchor="middle" fill="#888888" font-size="12">2019</text>
<text x="785" y="658" text-anchor="middle" fill="#888888" font-size="12">2020</text>
<text x="928" y="658" text-anchor="middle" fill="#888888" font-size="12">2021</text>
<text x="1071" y="658" text-anchor="middle" fill="#888888" font-size="12">2022</text>
<text x="1214" y="658" text-anchor="middle" fill="#888888" font-size="12">2023</text>
<text x="1357" y="658" text-anchor="middle" fill="#888888" font-size="12">2024</text>
<text x="1500" y="658" text-anchor="middle" fill="#888888" font-size="12">2025</text>
</svg></div>
  <div style="display:flex;gap:32px;margin-top:16px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:14px;color:#888888">10年走势</div>
      <div><svg viewBox="0 0 200 40" style="width:200px;height:40px"><polyline points="0,38 20,36 40,36 60,36 80,33 100,25 120,24 140,24 160,21 180,12 200,2" fill="none" stroke="#FF6B00" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
      <div style="font-size:14px;font-weight:600;color:#FF6B00">+146%</div>
    </div>
  </div>
</section>

<!-- P4: 关键发现 -->
<section class="s" style="flex-direction:column;justify-content:center">
  <div style="font-size:14px;color:#FF6B00;letter-spacing:1.5px;margin-bottom:24px">关键发现</div>
  <div style="font-size:56px;font-weight:700;color:#1A1A1A;line-height:1.2;margin-bottom:40px">10年涨幅<br/><span style="color:#FF6B00">+146%</span></div>
  <div style="font-size:20px;color:#888888;line-height:1.8;max-width:600px">
    从2015年的$1,160到2025年的$2,850，黄金价格在过去十年持续攀升。<br/>
    2020年突破$1,700，2024年加速至$2,386。
  </div>
  <div style="width:60px;height:3px;background:#FF6B00;margin-top:40px"></div>
</section>

<!-- P5: 结尾 -->
<section class="s" style="flex-direction:column;align-items:center;justify-content:center;text-align:center">
  <div style="font-size:64px;font-weight:700;color:#1A1A1A;margin-bottom:32px">STYLE 04</div>
  <div style="width:300px;height:3px;border-radius:2px;background:#FF6B00;margin-bottom:24px"></div>
  <div style="font-size:22px;color:#888888">Dieter Rams功能主义</div>
</section>

</div>
<div id="pi">1/5</div>
<script>
let c=0;const s=document.querySelectorAll('.s'),t=s.length;
function g(i){s.forEach(x=>x.classList.remove('on'));s[i].classList.add('on');document.getElementById('pi').textContent=(i+1)+'/'+t}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){c=(c+1)%t;g(c)}else if(e.key==='ArrowLeft'){c=(c-1+t)%t;g(c)}});
</script>
</body></html>
