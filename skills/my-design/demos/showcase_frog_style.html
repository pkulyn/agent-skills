<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw PPT 指南 — Frog Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1B2838;
    --bg-card: #243447;
    --fg: #F0EDE8;
    --muted: #8B9DB5;
    --accent: #FF6B35;
    --teal: #4ECDC4;
    --font-display: 'DM Sans', 'Noto Sans SC', sans-serif;
    --font-body: 'Noto Serif SC', 'DM Sans', serif;
    --radius: 10px;
  }

  body {
    background: #111820;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: var(--font-display);
    overflow: hidden;
  }

  .deck-container {
    width: 1920px;
    height: 1080px;
    position: relative;
    transform-origin: top left;
  }

  .slide {
    width: 1920px;
    height: 1080px;
    background: var(--bg);
    color: var(--fg);
    position: absolute;
    top: 0; left: 0;
    display: none;
    opacity: 0;
    overflow: hidden;
  }
  .slide.active { display: flex; opacity: 1; }

  /* ── Shared Decorations ── */
  .gradient-line {
    position: absolute;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--teal), var(--accent));
  }
  .glow-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
  }

  /* ── Slide 1: Cover ── */
  .slide-1 {
    flex-direction: row;
    position: relative;
  }
  .slide-1 .left {
    width: 55%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px 0 120px;
    position: relative;
    z-index: 2;
  }
  .slide-1 .right {
    width: 45%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Decorative warm glow on right */
  .slide-1 .right .glow-warm {
    width: 500px;
    height: 500px;
    background: var(--accent);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .slide-1 .right .glow-cool {
    width: 350px;
    height: 350px;
    background: var(--teal);
    position: absolute;
    top: 30%;
    left: 60%;
    transform: translate(-50%, -50%);
  }
  /* Abstract tech-human icon */
  .slide-1 .right .icon-abstract {
    position: relative;
    z-index: 2;
    width: 280px;
    height: 280px;
  }
  .slide-1 .right .icon-abstract .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid;
  }
  .slide-1 .right .icon-abstract .ring-1 {
    width: 280px; height: 280px;
    top: 0; left: 0;
    border-color: rgba(78, 205, 196, 0.4);
    animation: spin 20s linear infinite;
  }
  .slide-1 .right .icon-abstract .ring-2 {
    width: 200px; height: 200px;
    top: 40px; left: 40px;
    border-color: rgba(255, 107, 53, 0.5);
    animation: spin 15s linear infinite reverse;
  }
  .slide-1 .right .icon-abstract .ring-3 {
    width: 120px; height: 120px;
    top: 80px; left: 80px;
    border-color: rgba(240, 237, 232, 0.3);
    animation: spin 10s linear infinite;
  }
  .slide-1 .right .icon-abstract .core {
    position: absolute;
    width: 40px; height: 40px;
    top: 120px; left: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--accent));
  }

  .slide-1 .left .tag {
    font-size: 16px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.2s forwards;
  }
  .slide-1 .left h1 {
    font-size: 82px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.015em;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.4s forwards;
  }
  .slide-1 .left h1 .warm { color: var(--accent); }
  .slide-1 .left h1 .cool { color: var(--teal); }
  .slide-1 .left .subtitle {
    font-family: var(--font-body);
    font-size: 24px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.6;
    max-width: 600px;
    opacity: 0;
    animation: fadeUp 0.7s 0.6s forwards;
  }
  .slide-1 .gradient-line-bottom {
    bottom: 80px;
    left: 120px;
    width: 400px;
    opacity: 0;
    animation: fadeIn 0.8s 0.8s forwards;
  }

  /* ── Slide 2: Content ── */
  .slide-2 {
    flex-direction: column;
    position: relative;
  }
  .slide-2 .glow-bg-1 {
    width: 600px; height: 600px;
    background: var(--teal);
    top: -200px; right: -100px;
  }
  .slide-2 .glow-bg-2 {
    width: 400px; height: 400px;
    background: var(--accent);
    bottom: -150px; left: -100px;
  }

  .slide-2 .content {
    position: relative;
    z-index: 2;
    padding: 100px 120px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .slide-2 .header-row {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }
  .slide-2 .header-row .tag {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .slide-2 .header-row h2 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .slide-2 .cards {
    display: flex;
    gap: 32px;
    flex: 1;
  }
  .slide-2 .card {
    flex: 1;
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 44px 36px;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s forwards;
  }
  .slide-2 .card:nth-child(1) { animation-delay: 0.4s; }
  .slide-2 .card:nth-child(2) { animation-delay: 0.55s; }
  .slide-2 .card:nth-child(3) { animation-delay: 0.7s; }

  .slide-2 .card .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .slide-2 .card:nth-child(1) .card-accent { background: var(--teal); }
  .slide-2 .card:nth-child(2) .card-accent { background: linear-gradient(90deg, var(--teal), var(--accent)); }
  .slide-2 .card:nth-child(3) .card-accent { background: var(--accent); }

  .slide-2 .card .card-icon {
    font-size: 36px;
    margin-bottom: 20px;
  }
  .slide-2 .card:nth-child(1) .card-icon { color: var(--teal); }
  .slide-2 .card:nth-child(2) .card-icon { color: var(--muted); }
  .slide-2 .card:nth-child(3) .card-icon { color: var(--accent); }

  .slide-2 .card h3 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .slide-2 .card p {
    font-family: var(--font-body);
    font-size: 18px;
    color: var(--muted);
    line-height: 1.6;
    flex: 1;
  }
  .slide-2 .card .card-num {
    font-size: 72px;
    font-weight: 700;
    opacity: 0.06;
    position: absolute;
    bottom: 16px;
    right: 24px;
    line-height: 1;
  }

  /* ── Navigation ── */
  .nav {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 100;
    background: rgba(27, 40, 56, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s;
    font-family: var(--font-display);
  }
  .nav button:hover { color: var(--fg); }
  .nav .page-info {
    font-size: 14px;
    color: var(--muted);
    min-width: 60px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* ── Keyframes ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="deck-container" id="deck">

  <!-- Slide 1: Cover -->
  <div class="slide slide-1 active" data-screen-label="01 Cover">
    <div class="left">
      <div class="tag">OpenClaw · my-design</div>
      <h1>如何用好<br><span class="warm">OpenClaw</span> 的 <span class="cool">PPT</span></h1>
      <div class="subtitle">科技让工具强大，人文让设计温暖。<br>打字，回车，一份有温度的演示文稿。</div>
    </div>
    <div class="right">
      <div class="glow-circle glow-warm"></div>
      <div class="glow-circle glow-cool"></div>
      <div class="icon-abstract">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="core"></div>
      </div>
    </div>
    <div class="gradient-line gradient-line-bottom"></div>
  </div>

  <!-- Slide 2: Three Pillars -->
  <div class="slide slide-2" data-screen-label="02 三步工作流">
    <div class="glow-circle glow-bg-1"></div>
    <div class="glow-circle glow-bg-2"></div>
    <div class="content">
      <div class="header-row">
        <span class="tag">核心工作流</span>
        <h2>从想法到交付</h2>
      </div>
      <div class="cards">
        <div class="card">
          <div class="card-accent"></div>
          <div class="card-icon">◈</div>
          <h3>选风格，定 Grammar</h3>
          <p>描述你的场景，我推荐差异化方向。你选一个，我做2页showcase确认视觉基调——不盲跑。</p>
          <div class="card-num">01</div>
        </div>
        <div class="card">
          <div class="card-accent"></div>
          <div class="card-icon">⬡</div>
          <h3>说内容，批量生产</h3>
          <p>大纲、文档、口述要点都行。我按grammar推全部页面，每页一个核心信息，不堆砌。</p>
          <div class="card-num">02</div>
        </div>
        <div class="card">
          <div class="card-accent"></div>
          <div class="card-icon">◉</div>
          <h3>选格式，拿交付</h3>
          <p>HTML预览 / PPTX编辑 / PDF存档 / 品牌套壳——四选或全要，你说了算。</p>
          <div class="card-num">03</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prevSlide()">←</button>
  <span class="page-info" id="pageInfo">1 / 2</span>
  <button onclick="nextSlide()">→</button>
</div>

<script>
  function scaleDeck() {
    const d = document.getElementById('deck');
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const s = Math.min(sx, sy);
    d.style.transform = `scale(${s})`;
    d.style.marginLeft = ((window.innerWidth - 1920 * s) / 2) + 'px';
    d.style.marginTop = ((window.innerHeight - 1080 * s) / 2) + 'px';
  }
  window.addEventListener('resize', scaleDeck);
  scaleDeck();

  let current = 0;
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;

  function showSlide(n) {
    slides.forEach((s, i) => {
      s.classList.remove('active');
      if (i === n) s.classList.add('active');
    });
    current = n;
    document.getElementById('pageInfo').textContent = `${n + 1} / ${total}`;
    localStorage.setItem('deck_current_frog', n);
  }
  function nextSlide() { if (current < total - 1) showSlide(current + 1); }
  function prevSlide() { if (current > 0) showSlide(current - 1); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  });

  const saved = parseInt(localStorage.getItem('deck_current_frog'));
  if (!isNaN(saved) && saved >= 0 && saved < total) showSlide(saved);
  window.__ready = true;
</script>

</body>
</html>
